{% extends 'base.html' %}
{% load static %}

{% block body %}
<main class="principal">
    <section class="conta">
        <div class="conta__container">
            <div style="width: 100%; margin-bottom: 20px;">
                <a href="{% url 'gerenciar_loja' %}" style="text-decoration: none; color: #666; font-size: 1.4rem; display: flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-arrow-left"></i> Voltar para Gerenciar Loja
                </a>
            </div>

            <div class="checkout__titulos">
                <p class="checkout__titulo">Editar Produto: {{ produto.nome }}</p>
            </div>

            <form class="conta__form" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="conta__item conta__item--email">
                    <label for="nome">Nome do Produto</label>
                    <input name="nome" type="text" value="{{ produto.nome }}" required>
                </div>
                <div class="conta__item">
                    <label for="preco">Preço (R$)</label>
                    <input name="preco" type="number" step="0.01" value="{{ produto.preco|stringformat:'f' }}" required>
                </div>
                <div class="conta__item">
                    <label for="preco_fragacoin">Preço (Fragacoins)</label>
                    <input name="preco_fragacoin" type="number" value="{{ produto.preco_fragacoin }}" required>
                </div>
                <div class="conta__item">
                    <label for="categoria">Categoria</label>
                    <select name="categoria" class="produtos__select" style="width:100%;" required>
                        {% for categoria in categorias %}
                        <option value="{{ categoria.id }}" {% if categoria.id == produto.categoria.id %}selected{% endif %}>{{ categoria.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="conta__item">
                    <label for="tipo">Tipo</label>
                    <select name="tipo" class="produtos__select" style="width:100%;" required>
                        {% for tipo in tipos %}
                        <option value="{{ tipo.id }}" {% if tipo.id == produto.tipo.id %}selected{% endif %}>{{ tipo.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="conta__item conta__item--email">
                    <label for="descricao">Descrição</label>
                    <textarea name="descricao" rows="4" style="width:100%; padding: 1rem; border: 1px solid #626262; border-radius: 4px;">{{ produto.descricao|default_if_none:'' }}</textarea>
                </div>
                <div class="conta__item conta__item--email">
                    <p>Imagem Atual:</p>
                    <img src="{{ produto.imagem.url }}" alt="{{ produto.nome }}" style="width: 100px; height: auto; margin-bottom: 1rem;">
                    <label for="imagem">Trocar Imagem</label>
                    <input name="imagem" type="file">
                </div>
                <div class="conta__item">
                    <label for="ativo">Produto Ativo?</label>
                    <input type="checkbox" name="ativo" {% if produto.ativo %}checked{% endif %}>
                </div>

                <button class="subtotal__botao" type="submit">Salvar Alterações</button>
            </form>
        </div>
    </section>
</main>
{% endblock %}
